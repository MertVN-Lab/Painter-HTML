<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Painter HTML</title>
    <style>
        :root {
            --win-gray: #c0c0c0;
            --win-blue: #000080;
            --win-border-light: #ffffff;
            --win-border-dark: #808080;
        }

        * { box-sizing: border-box; }

        body {
            background-color: #008080;
            font-family: 'Tahoma', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .window {
            background: var(--win-gray);
            border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .title-bar {
            background: var(--win-blue);
            color: white;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }

        .main-layout {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            padding: 2px;
            gap: 2px;
        }

        /* Sol Araç Çubuğu */
        .toolbar {
            width: 85px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px;
            border: 2px inset white;
            background: var(--win-gray);
            flex-shrink: 0;
            overflow-y: auto;
        }

        .tool {
            width: 75px;
            height: 55px;
            background: var(--win-gray);
            border: 2px outset white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            user-select: none;
        }

        .tool span {
            font-size: 9px;
            pointer-events: none;
            margin-top: 2px;
        }

        .tool.active {
            border: 2px inset white;
            background: #e0e0e0;
        }

        .tool:hover:not(.active) {
            background: #d0d0d0;
        }

        /* Yazı Boyutu Ayarı */
        .font-settings {
            border-top: 2px solid var(--win-border-dark);
            margin-top: 5px;
            padding-top: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .font-settings label {
            font-size: 10px;
            font-weight: bold;
        }

        #font-size-input {
            width: 60px;
            font-family: 'Tahoma', sans-serif;
        }

        /* Çizim Alanı */
        #canvas-container {
            flex-grow: 1;
            background: white;
            border: 3px inset var(--win-border-dark);
            position: relative;
            overflow: auto;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px;
            /* DÜZELTME 12: cursor göstergesi */
            cursor: crosshair;
        }

        /* DÜZELTME 5: Line tipi için border'ı kaldırıyoruz, tip bazlı style */
        .drawn {
            position: absolute;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
        }

        .drawn.type-box {
            border: 1px solid #000;
        }

        .drawn.type-line {
            border: none;
        }

        .drawn.type-text {
            border: 1px dashed #ccc;
            background: transparent !important;
        }

        .text-input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            font-family: sans-serif;
            resize: none;
            outline: none;
            padding: 2px;
            margin: 0;
            display: block;
            overflow: hidden;
        }

        /* Sağ Panel - Kod Çıktısı */
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            border-left: 2px solid var(--win-border-dark);
            flex-shrink: 0;
        }

        #code-output {
            flex-grow: 1;
            background: #1e1e1e;
            color: #75beff;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            overflow: auto;
            white-space: pre;
            border: 2px inset #000;
        }

        /* Alt Renk Paleti */
        .color-bar {
            height: 45px;
            background: var(--win-gray);
            display: flex;
            align-items: center;
            padding-left: 95px;
            gap: 4px;
            border-top: 2px solid var(--win-border-dark);
            flex-shrink: 0;
            flex-wrap: nowrap;
        }

        .color-box {
            width: 22px;
            height: 22px;
            border: 2px inset white;
            cursor: pointer;
            flex-shrink: 0;
        }

        .color-box:hover {
            transform: scale(1.15);
            z-index: 1;
        }

        .current-color-display {
            width: 32px;
            height: 32px;
            border: 2px inset white;
            margin-right: 15px;
            flex-shrink: 0;
        }

        /* Önizleme elementi */
        #preview-element {
            position: absolute;
            box-sizing: border-box;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>Painter HTML</span>
        <span>[ _ □ X ]</span>
    </div>

    <div class="main-layout">
        <div class="toolbar">
            <div class="tool active" id="box-tool" onclick="setTool('box')">⬜<span>Kutu</span></div>
            <div class="tool" id="line-tool" onclick="setTool('line')">➖<span>Çizgi</span></div>
            <div class="tool" id="text-tool" onclick="setTool('text')">A<span>Yazı</span></div>

            <div class="font-settings">
                <label>Punto</label>
                <!-- DÜZELTME 10: parseInt ile okunacak -->
                <input type="number" id="font-size-input" value="16" min="8" max="100" onchange="updateFontSize()">
            </div>

            <hr style="width:100%; margin: 4px 0;">
            <div class="tool" id="undo-tool" onclick="undo()">↩️<span>Geri Al</span></div>
            <div class="tool" id="redo-tool" onclick="redo()">↪️<span>Yinele</span></div>
            <div class="tool" onclick="clearCanvas()" style="color:red; margin-top:auto;">🗑️<span>Sıfırla</span></div>
        </div>

        <div id="canvas-container">
            <!-- DÜZELTME 4 & Önizleme: Çizim sırasında önizleme elemanı -->
            <div id="preview-element"></div>
        </div>

        <div class="sidebar">
            <div style="background:var(--win-blue); color:white; padding:4px; font-size:12px; text-align:center;">CANLI HTML/CSS KODU</div>
            <div id="code-output"></div>
            <button onclick="copyCode()" style="padding:10px; background:var(--win-gray); border:2px outset white; cursor:pointer; font-weight:bold; font-family:'Tahoma',sans-serif;">📋 KODU KOPYALA</button>
        </div>
    </div>

    <div class="color-bar" id="palette">
        <div class="current-color-display" id="active-color-show" style="background: #000000;" title="Seçili Renk"></div>
    </div>
</div>

<script>
    let currentTool = 'box';
    let currentColor = '#000000';
    let currentFontSize = 16; // DÜZELTME 10: sayı olarak tutulacak
    let elements = [];
    let redoStack = [];
    let drawing = false;
    let startX, startY;

    const container = document.getElementById('canvas-container');
    const codeOutput = document.getElementById('code-output');
    const fontSizeInput = document.getElementById('font-size-input');
    const preview = document.getElementById('preview-element');

    // Renk paleti yükleme
    const colors = [
        '#000000','#808080','#c0c0c0','#ffffff',
        '#FF0000','#800000','#FFA500','#FFFF00',
        '#00FF00','#008000','#00FFFF','#008080',
        '#0000FF','#000080','#FF00FF','#4b0082'
    ];

    const palette = document.getElementById('palette');
    colors.forEach(c => {
        const div = document.createElement('div');
        div.className = 'color-box';
        div.style.background = c;
        div.title = c;
        div.onclick = () => {
            currentColor = c;
            document.getElementById('active-color-show').style.background = c;
        };
        palette.appendChild(div);
    });

    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
        const toolEl = document.getElementById(t + '-tool');
        if (toolEl) toolEl.classList.add('active');
    }

    // DÜZELTME 10: parseInt kullan
    function updateFontSize() {
        currentFontSize = parseInt(fontSizeInput.value, 10) || 16;
        if (currentFontSize < 8) currentFontSize = 8;
        if (currentFontSize > 100) currentFontSize = 100;
        fontSizeInput.value = currentFontSize;
    }

    function undo() {
        if (elements.length > 0) {
            redoStack.push(elements.pop());
            renderCanvas();
        }
    }

    function redo() {
        if (redoStack.length > 0) {
            elements.push(redoStack.pop());
            renderCanvas();
        }
    }

    // Klavye kısayolları
    window.onkeydown = (e) => {
        // Textarea içindeyken ctrl+z/y'yi engelleme
        if (e.target.tagName === 'TEXTAREA') return;
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
        if (e.key === 'Delete') { /* İleride seçim silme için */ }
    };

    // DÜZELTME 11: HTML encode fonksiyonu - XSS önleme
    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function renderCanvas() {
        // Textarea focus/cursor kaybını önlemek için:
        // Önce eski elemanları kaldır, preview'i koru
        const existing = container.querySelectorAll('.drawn');
        existing.forEach(el => el.remove());

        elements.forEach((el, index) => {
            const div = document.createElement('div');
            div.className = 'drawn type-' + el.type;
            div.style.left = el.l;
            div.style.top = el.t;
            div.style.width = el.w;
            div.style.height = el.h;

            if (el.type === 'text') {
                div.style.backgroundColor = 'transparent';
                div.style.color = el.c;
                div.style.fontSize = el.fontSize + 'px';

                const txt = document.createElement('textarea');
                txt.className = 'text-input';
                txt.value = el.text;
                txt.style.color = el.c;
                txt.style.fontSize = el.fontSize + 'px';
                // DÜZELTME 3: Closure ile doğru index referansı
                txt.oninput = (function(idx) {
                    return function(e) {
                        elements[idx].text = e.target.value;
                        updateCode();
                    };
                })(index);
                div.appendChild(txt);

            } else if (el.type === 'line') {
                // DÜZELTME 5: Çizgi için background kullan, border yok
                div.style.backgroundColor = el.c;
                div.style.height = '3px';

            } else {
                // box
                div.style.backgroundColor = el.c;
            }

            container.appendChild(div);
        });

        updateCode();
    }

    // DÜZELTME 12: Scroll offset'i hesaba kat
    function getRelativePos(e) {
        const rect = container.getBoundingClientRect();
        return {
            x: e.clientX - rect.left + container.scrollLeft,
            y: e.clientY - rect.top + container.scrollTop
        };
    }

    container.onmousedown = (e) => {
        // DÜZELTME 4: Textarea içine tıklamada çizim başlatma
        if (e.target.tagName === 'TEXTAREA') return;
        // Drawn elemanlarına tıklamada çizim başlatma (üst üste çizim için container'a tıklama zorunlu değil)
        if (e.target.classList.contains('drawn')) return;

        drawing = true;
        // DÜZELTME 9: redoStack'i mousedown'da DEĞİL, mouseup'ta temizle
        const pos = getRelativePos(e);
        startX = pos.x;
        startY = pos.y;

        // Önizleme elemanını hazırla
        preview.style.display = 'block';
        preview.style.left = startX + 'px';
        preview.style.top = startY + 'px';
        preview.style.width = '0px';
        preview.style.height = currentTool === 'line' ? '3px' : '0px';
        preview.style.backgroundColor = currentTool === 'text' ? 'transparent' : currentColor;
        preview.style.border = currentTool === 'box' ? '1px dashed #555' : (currentTool === 'text' ? '1px dashed #aaa' : 'none');
    };

    container.onmousemove = (e) => {
        if (!drawing) return;
        const pos = getRelativePos(e);
        const curX = pos.x;
        const curY = pos.y;

        const w = Math.abs(curX - startX);
        const h = Math.abs(curY - startY);

        // DÜZELTME 2: Negatif yönde çizim düzeltmesi
        const left = Math.min(curX, startX);
        const top = Math.min(curY, startY);

        preview.style.left = left + 'px';
        preview.style.width = w + 'px';

        if (currentTool === 'line') {
            // Çizgi: dikey pozisyon sabit (startY), yükseklik sabit 3px
            preview.style.top = startY + 'px';
            preview.style.height = '3px';
        } else {
            preview.style.top = top + 'px';
            preview.style.height = h + 'px';
        }
    };

    // DÜZELTME 8: Document üzerinde mouseup dinle - mouse dışarı çıkarsa da yakala
    document.onmouseup = (e) => {
        if (!drawing) return;
        drawing = false;

        const w = parseInt(preview.style.width, 10);
        const h = parseInt(preview.style.height, 10);

        // Çok küçük elemanları eklememe (yanlışlıkla tıklama)
        if (w < 3 && h < 3) {
            preview.style.display = 'none';
            return;
        }

        // DÜZELTME 9: redoStack burada temizleniyor
        redoStack = [];

        // DÜZELTME 1: Line için height doğru kaydediliyor
        elements.push({
            type: currentTool,
            w: preview.style.width,
            h: currentTool === 'line' ? '3px' : preview.style.height,
            t: preview.style.top,
            l: preview.style.left,
            c: currentColor,
            text: '',
            fontSize: currentFontSize
        });

        preview.style.display = 'none';
        renderCanvas();
    };

    function pxToPercent(val, total) {
        // "123px" → yüzde string'e çevirir, toplam 0 ise px olarak bırak
        const num = parseFloat(val);
        if (!total || isNaN(num)) return val;
        return (num / total * 100).toFixed(4) + '%';
    }

    function updateCode() {
        // Canvas'ın gerçek boyutunu al (scroll dahil toplam içerik alanı)
        const cW = container.scrollWidth;
        const cH = container.scrollHeight;

        let css = `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { margin: 0; }\n  .site { position: relative; width: 100%; height: 100vh; overflow: hidden; }\n`;
        let body = `<body>\n  <div class="site">\n`;

        elements.forEach((el, i) => {
            const name = `obj-${i}`;

            // Piksel değerlerini % ye çevir
            const left  = pxToPercent(el.l, cW);
            const top   = pxToPercent(el.t, cH);
            const width = pxToPercent(el.w, cW);
            // Çizgi için yükseklik sabit 3px kalsın, diğerleri %
            const height = el.type === 'line' ? '3px' : pxToPercent(el.h, cH);

            css += `  .${name} { position: absolute; top: ${top}; left: ${left}; width: ${width}; height: ${height}; `;

            if (el.type === 'text') {
                css += `font-size: ${el.fontSize}px; color: ${el.c}; font-family: sans-serif; white-space: pre-wrap; }\n`;
                // Boşsa kod çıktısına ekleme
                if (!el.text.trim()) return;
                body += `    <div class="${name}">${escapeHtml(el.text)}</div>\n`;
            } else if (el.type === 'line') {
                css += `background: ${el.c}; }\n`;
                body += `    <div class="${name}"></div>\n`;
            } else {
                css += `background: ${el.c}; border: 1px solid #000; }\n`;
                body += `    <div class="${name}"></div>\n`;
            }
        });

        const fullCode = css + `</style>\n</head>\n` + body + `  </div>\n</body>\n</html>`;
        codeOutput.textContent = fullCode;
    }

    function clearCanvas() {
        if (confirm('Tüm çizimler silinsin mi?')) {
            elements = [];
            redoStack = [];
            renderCanvas();
        }
    }

    function copyCode() {
        const text = codeOutput.textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('Kod panoya kopyalandı!');
        }).catch(() => {
            // Clipboard API desteklenmiyorsa fallback
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('Kod kopyalandı!');
        });
    }

    // İlk render
    updateCode();
</script>
</body>
</html>
